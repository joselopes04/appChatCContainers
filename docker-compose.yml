services:
  servidor_chat:
    build: ./server

  cliente_1:
    build: ./client
    stdin_open: true # Mantém o teclado (stdin) aberto para o fgets
    tty: true        # Simula um terminal
    network_mode: "service:servidor_chat" # O truque para o 127.0.0.1 da sebenta funcionar!
    depends_on:
      - servidor_chat # Garante que o servidor arranca primeiro

  cliente_2:
    build: ./client
    stdin_open: true
    tty: true
    network_mode: "service:servidor_chat"
    depends_on:
      - servidor_chat